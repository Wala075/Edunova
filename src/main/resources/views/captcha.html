<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title>hCaptcha</title>
    <script src="https://js.hcaptcha.com/1/api.js"
            async defer></script>
    <style>
        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system,
            sans-serif;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            text-align: center;
            max-width: 380px;
            width: 92%;
        }
        .icon-box {
            width: 72px; height: 72px;
            background: linear-gradient(
                    135deg, #7c3aed, #4f46e5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 34px;
        }
        h2 {
            font-size: 20px;
            color: #1e293b;
            margin-bottom: 6px;
            font-weight: 700;
        }
        .sub {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .captcha-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            min-height: 78px;
            align-items: center;
        }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(
                    135deg, #7c3aed, #4f46e5);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }
        .btn:hover:not(:disabled) {
            opacity: 0.92;
            transform: translateY(-1px);
        }
        .btn:disabled {
            background: #c4b5fd;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 14px;
            font-size: 13px;
            min-height: 20px;
            font-weight: 500;
        }
        .status.success { color: #16a34a; }
        .status.error   { color: #dc2626; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f0fdf4;
            border: 1.5px solid #22c55e;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            color: #16a34a;
            font-weight: 600;
            margin-top: 10px;
        }
        .separator {
            height: 1px;
            background: #e2e8f0;
            margin: 20px 0;
        }
        .secure-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 11px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="card">

    <div class="icon-box">🛡️</div>

    <h2>Vérification de sécurité</h2>
    <p class="sub">
        Confirmez que vous êtes humain pour<br/>
        accéder à votre espace EduNova
    </p>

    <!-- Widget hCaptcha -->
    <div class="captcha-wrap">
        <div class="h-captcha"
             data-sitekey="e5dc64c4-b178-446a-9116-e1fc0cb40780"
             data-callback="onSuccess"
             data-expired-callback="onExpired"
             data-error-callback="onError"
             data-theme="light"
             data-size="normal">
        </div>
    </div>

    <div class="separator"></div>

    <!-- Bouton valider -->
    <button class="btn" id="btnValider"
            onclick="valider()" disabled>
        ✓ &nbsp; Valider et continuer
    </button>

    <div class="status" id="status"></div>

    <div class="secure-info" style="margin-top:16px;">
        <span>🔒</span>
        <span>Protégé par hCaptcha · Politique de
              confidentialité</span>
    </div>
</div>

<script>
    var captchaToken = null;

    function onSuccess(token) {
        captchaToken = token;
        var btn = document.getElementById('btnValider');
        btn.removeAttribute('disabled');
        var status = document.getElementById('status');
        status.className = 'status success';
        status.innerHTML =
            '<span>✅ Vérification réussie !</span>';
    }

    function onExpired() {
        captchaToken = null;
        var btn = document.getElementById('btnValider');
        btn.setAttribute('disabled', 'true');
        var status = document.getElementById('status');
        status.className = 'status error';
        status.textContent =
            '⚠ Vérification expirée, réessayez.';
    }

    function onError() {
        captchaToken = null;
        var status = document.getElementById('status');
        status.className = 'status error';
        status.textContent =
            '❌ Erreur réseau. Vérifiez votre connexion.';
    }

    function valider() {
        if (!captchaToken) return;
        var status = document.getElementById('status');
        status.className = 'status success';
        status.textContent = '⏳ Vérification en cours...';
        // Envoyer le token à JavaFX
        window.location.href =
            'captcha://success?token=' +
            encodeURIComponent(captchaToken);
    }
</script>
</body>
</html>
